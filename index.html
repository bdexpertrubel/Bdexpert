<!DOCTYPE html>
<html>
<head>
    <title>My Social Site</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: #f0f2f5;
        }

        /* Navbar */
        .navbar {
            background: #1877f2;
            color: white;
            padding: 15px;
            font-size: 20px;
        }

        /* Container */
        .container {
            width: 90%;
            margin: auto;
        }

        /* Post Box */
        .post-box {
            background: white;
            padding: 10px;
            margin-top: 10px;
            border-radius: 10px;
        }

        input {
            width: 100%;
            padding: 10px;
            border-radius: 20px;
            border: 1px solid #ccc;
        }

        button {
            margin-top: 10px;
            background: #1877f2;
            color: white;
            border: none;
            padding: 10px;
            width: 100%;
            border-radius: 20px;
        }

        /* Post */
        .post {
            background: white;
            padding: 10px;
            margin-top: 10px;
            border-radius: 10px;
        }
    </style>

</head>
<body>

    <div class="navbar">
        My Social Site
    </div>

    <div class="container">

        <!-- Post Create -->
        <div class="post-box">
            <input type="text" placeholder="What's on your mind?">
            <button>Post</button>
        </div>

        <!-- Posts -->
        <div class="post">
            <h3>Rubel</h3>
            <p>Hello! This is my first post 😎</p>
        </div>

        <div class="post">
            <h3>User</h3>
            <p>This looks like Facebook 😍</p>
        </div>

    </div>

</body>
</html>
