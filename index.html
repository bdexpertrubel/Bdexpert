<!DOCTYPE html>
<html>
<head>
    <title>Mini Facebook</title>
    <style>
        body {
            font-family: Arial;
            background: #f0f2f5;
            margin: 0;
        }
        .header {
            background: #1877f2;
            color: white;
            padding: 15px;
            text-align: center;
            font-size: 24px;
        }
        .container {
            width: 90%;
            margin: auto;
            margin-top: 20px;
        }
        .post-box {
            background: white;
            padding: 15px;
            border-radius: 10px;
        }
        .post-box textarea {
            width: 100%;
            height: 60px;
        }
        .post-box button {
            background: #1877f2;
            color: white;
            border: none;
            padding: 10px;
            margin-top: 10px;
        }
        .post {
            background: white;
            padding: 10px;
            margin-top: 10px;
            border-radius: 10px;
        }
    </style>
</head>
<body>

<div class="header">Mini Facebook</div>

<div class="container">
    <div class="post-box">
        <textarea id="postInput" placeholder="What's on your mind?"></textarea>
        <button onclick="addPost()">Post</button>
    </div>

    <div id="posts"></div>
</div>

<script>
function addPost() {
    var input = document.getElementById("postInput");
    var postText = input.value;

    if(postText.trim() === "") return;

    var postDiv = document.createElement("div");
    postDiv.className = "post";
    postDiv.innerText = postText;

    document.getElementById("posts").prepend(postDiv);

    input.value = "";
}
</script>

</body>
</html>
