
<!DOCTYPE html>
<html>
<head>
    <title>Responsive Website</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
        }

        /* Navbar */
        .navbar {
            background: #111;
            color: white;
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .nav-links a {
            color: white;
            margin: 0 10px;
            text-decoration: none;
        }

        /* Hero */
        .hero {
            background: #333;
            color: white;
            text-align: center;
            padding: 60px 20px;
        }

        /* Cards */
        .cards {
            display: flex;
            justify-content: center;
            gap: 15px;
            padding: 20px;
        }

        .card {
            background: #f4f4f4;
            padding: 20px;
            width: 250px;
            border-radius: 10px;
            text-align: center;
        }

        /* 📱 Mobile Responsive */
        @media (max-width: 768px) {

            .navbar {
                flex-direction: column;
                text-align: center;
            }

            .nav-links {
                margin-top: 10px;
            }

            .cards {
                flex-direction: column;
                align-items: center;
            }

            .card {
                width: 90%;
            }
        }

    </style>
</head>

<body>

    <!-- Navbar -->
    <div class="navbar">
        <h2>MRK Technology</h2>
        <div class="nav-links">
            <a href="#">Home</a>
            <a href="#">About</a>
            <a href="#">Contact</a>
        </div>
    </div>

    <!-- Hero -->
    <div class="hero">
        <h1>Responsive Website</h1>
        <p>Mobile & Desktop friendly 😎</p>
    </div>

    <!-- Cards -->
    <div class="cards">
        <div class="card">
            <h3>HTML</h3>
            <p>Structure</p>
        </div>

        <div class="card">
            <h3>CSS</h3>
            <p>Design</p>
        </div>

        <div class="card">
            <h3>JS</h3>
            <p>Function</p>
        </div>
    </div>

</body>
</html>
