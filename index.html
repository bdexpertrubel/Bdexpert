<!DOCTYPE html>
<html>
<head>
    <title>MRK Technology</title>

    <!-- গুরুত্বপূর্ণ meta tag -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
        }

        /* Navbar */
        .navbar {
            background: #111;
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: white;
        }

        /* Menu Icon */
        .menu-icon {
            font-size: 25px;
            cursor: pointer;
        }

        /* Login Button */
        .login-btn {
            background: orange;
            padding: 8px 15px;
            border-radius: 5px;
            text-decoration: none;
            color: white;
        }

        .login-btn:hover {
            background: red;
        }

        /* Hero Section */
        .hero {
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)),
                        url("https://via.placeholder.com/1200");
            height: 300px;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        /* Cards */
        .cards {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 20px;
            padding: 20px;
        }

        .card {
            background: #f4f4f4;
            padding: 20px;
            width: 90%;
            max-width: 250px;
            border-radius: 10px;
            text-align: center;
            transition: 0.3s;
        }

        .card:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        /* Button */
        .btn {
            background: black;
            color: white;
            padding: 10px 20px;
            border-radius: 5px;
            display: inline-block;
            margin-top: 10px;
            cursor: pointer;
        }

        .btn:hover {
            background: orange;
        }

        /* Footer */
        .footer {
            background: #111;
            color: white;
            text-align: center;
            padding: 15px;
            margin-top: 20px;
        }

    </style>
</head>

<body>

    <!-- Navbar -->
    <div class="navbar">

        <!-- Left Menu -->
        <div class="menu-icon">&#9776;</div>

        <!-- Title -->
        <h2>MRK Technology</h2>

        <!-- Right Login -->
        <a href="login.html" class="login-btn">Login</a>

    </div>

    <!-- Hero -->
    <div class="hero">
        <div>
            <h1>Welcome to MRK Technology</h1>
            <p>Learn Web Design Easily 🚀</p>
        </div>
    </div>

    <!-- Cards -->
    <div class="cards">
        <div class="card">
            <h3>HTML</h3>
            <p>Website structure তৈরি করতে ব্যবহার হয়</p>
            <div class="btn">Learn More</div>
        </div>

        <div class="card">
            <h3>CSS</h3>
            <p>Website সুন্দর করতে ব্যবহার হয়</p>
            <div class="btn">Learn More</div>
        </div>

        <div class="card">
            <h3>JavaScript</h3>
            <p>Website interactive করতে ব্যবহার হয়</p>
            <div class="btn">Learn More</div>
        </div>
    </div>

    <!-- Footer -->
    <div class="footer">
        <p>© 2026 MRK Technology | All Rights Reserved</p>
    </div>

</body>
</html>
